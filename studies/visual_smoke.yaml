# Визуальный смоук-тест end-to-end (spec_synthetic-panel_v1.4.md §1, [F2] DoD п.2).
# Назначение: НЕ клиентское исследование — проверка конвейера визуальных стимулов
# целиком (проба зрения -> генерация с реальным просмотром файла -> скоринг ->
# отчёт) на вымышленном бренде. Три макета условной упаковки шампуня вымышленного
# «ДемоБренд» (studies/assets/visual_smoke/, сгенерированы PIL, никаких клиентских
# материалов) — сознательно различаются и композицией/цветом, и содержанием
# hero-заявления, чтобы различия были реальными и проверяемыми пробой зрения и
# ответами персон, а не подгонкой:
#   A — минималистичный светлый (кремовый фон, тонкая антиква, зелёный лист) —
#       hero-заявление «БЕЗ СУЛЬФАТОВ»
#   B — яркий насыщенный (розово-оранжевый градиент, лучи-всплеск, глянец,
#       жёлтый бейдж «×2») — hero-заявление «ДВОЙНОЙ ОБЪЁМ»
#   C — аптечный строгий (белый/тёмно-синий, печать с галочкой, таблица
#       "показателей") — hero-заявление «КЛИНИЧЕСКИ ПРОТЕСТИРОВАНО»
# Стимулы — image+label (без text): stimulus_kind должен вычислиться как "image"
# (канон SSR, arXiv 2510.08338 — image-стимул в дефолтной конфигурации).
#
# Зона метода: 🟢 считываемость смыслов с макета / сравнение вариантов по смыслам
# и барьерам (SKILL.md §6). Эстетическое предпочтение и полочная заметность здесь
# не тестируются.
name: visual_smoke
type: claims_ranking
question_scale: purchase_intent

stimuli:
  - id: A
    image: assets/visual_smoke/demo_a_minimalist_sulfate_free.png
    label: "Минималистичный светлый — «Без сульфатов»"
    key_element: "БЕЗ СУЛЬФАТОВ"
  - id: B
    image: assets/visual_smoke/demo_b_bright_double_volume.png
    label: "Яркий насыщенный — «Двойной объём»"
    key_element: "ДВОЙНОЙ ОБЪЁМ"
  - id: C
    image: assets/visual_smoke/demo_c_clinical_tested.png
    label: "Аптечный строгий — «Клинически протестировано»"
    key_element: "КЛИНИЧЕСКИ ПРОТЕСТИРОВАНО"

segments: [naturalniki_bez_khimii, razocharovannye_veterany]
respondents_per_segment: 4
samples_per_respondent: 2

# controls не указан -> ВКЛЮЧЕНЫ по умолчанию (§1.4/§2.2): run_study.py добавит
# плацебо-заготовку (по умолчанию — контрастный kind irrelevant/empty_promise из
# references/placebo_bank_ru.yaml) и пару-ловушку под слепыми id на стадии
# generate; раскрытие реальных id и вердикт — на score/report.

notes: >
  Визуальный смоук-тест интеграции v1.4 (Модуль 1), не боевой прогон: 2 сегмента
  панели hairloss_demo с содержательно разными ожидаемыми реакциями на три
  макета — naturalniki_bez_khimii (приверженцы натуральных средств, скептичны к
  химии в составе: ожидаемо лучший приём макета A «без сульфатов», настороженность
  к «клинически протестировано» C как к аптечно-химическому языку и к «двойной
  объём» B как к силиконовому эффекту) и razocharovannye_veterany (хронические
  разочарованные, перепробовали всё: ожидаемо ироничная реакция на громкое обещание
  B «двойной объём», больше доверия честной, не превосходной формулировке C
  «клинически протестировано»). 4 профиля на сегмент (8 профилей всего) × 2
  независимых генерации. Проверяемый критерий пилота — НЕ абсолютный рейтинг
  A/B/C (не предмет интереса сам по себе), а то, что (1) проба зрения честно
  распознаёт key_element каждого макета, (2) свободные ответы персон реально
  ссылаются на визуальные/текстовые различия макетов (состав/натуральность для A,
  объём/яркость для B, клиническую доказательность для C), а не на один и тот же
  шаблон независимо от картинки, (3) самоконтроль (плацебо/пара-ловушка) проходит
  так же, как и в текстовых прогонах.
