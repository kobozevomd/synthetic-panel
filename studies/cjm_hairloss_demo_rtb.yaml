name: cjm_hairloss_demo_rtb
type: claims_ranking
question_scale: purchase_intent
stimuli:
- id: rtb1
  text: Если переживаете, что активный уход может быть слишком агрессивным именно сейчас, ДемоБренд предлагает
    бережную поддержку волос благодаря формуле с растительными экстрактами, которая укрепляет волосяные
    фолликулы, не перегружая их синтетическими компонентами.
- id: rtb2
  text: Если вы уже разочаровались в громких обещаниях «заново за месяц», ДемоБренд не обещает чуда —
    он поддерживает волосы благодаря составу, который работает на укрепление структуры волоса изнутри,
    и честно говорит о постепенном, а не мгновенном результате.
- id: rtb3
  text: Если не хочется превращать уход за волосами в отдельный сложный ритуал или разговор с кем-либо,
    ДемоБренд — это одно простое действие внутри привычного ухода, разработанное с учётом рекомендаций
    специалистов по уходу за волосами, без лишних шагов и лишнего внимания к теме.
- id: rtb4
  text: Если для вас важно понимать, что именно вы наносите на кожу головы, состав ДемоБренд полностью
    прозрачен и построен на растительных активных компонентах, действие каждого из которых объяснено просто,
    без сложных терминов и голых обещаний.
segments:
- molodye_mamy_posle_rodov
- muzhchiny_rannee_poredenie
respondents_per_segment: 10
samples_per_respondent: 2
notes: Автоматически сгенерировано cjm_to_study.py из 01_segments_merged.yaml + 04_rtb_candidates.yaml
  (CJM-прогон cjm_hairloss_demo). RTB-кандидаты — 🟡 гипотезы для проверки панелью, результат встраивается
