# Мини-прогон end-to-end с контролями (spec_synthetic-panel_v1.3.md, [F2] DoD п.3).
# Назначение: НЕ клиентское исследование — смоук-тест самоконтроля §1.4 (плацебо
# должно упасть в нижнюю треть рейтинга, пара-ловушка не должна статистически
# отделиться от оригинала) на новом стеке (якоря v2 + ai-forever/ru-en-RoSBERTa,
# agent-режим). Стимулы — нарочито нейтральные демо-клеймы об уходе за волосами
# (не биотиналь-бренд, не клиентские формулировки), сопоставимой силы, без
# заострённых гипотез: любой правдоподобный порядок между ними приемлем, важен
# только результат самоконтроля.
#
# Зона метода: зелёная (ранжирование клеймов, относительные выводы).
name: controls_smoke
type: claims_ranking
question_scale: purchase_intent

stimuli:
  - id: N1
    text: "Уход за волосами с растительными экстрактами в составе"
  - id: N2
    text: "Шампунь мягко очищает и подходит для частого использования"
  - id: N3
    text: "В составе комплекс витаминов для укрепления волос"
  - id: N4
    text: "Средство прошло дерматологический контроль качества"

segments: [naturalniki_bez_khimii, razocharovannye_veterany]
respondents_per_segment: 4
samples_per_respondent: 2

# controls не указан -> ВКЛЮЧЕНЫ по умолчанию (§1.4): run_study.py добавит
# плацебо-заготовку из references/placebo_bank_ru.yaml и пару-ловушку
# (косметическая копия одного из N1-N4) под слепыми id на стадии generate;
# раскрытие реальных id и вердикт — на score/report.

notes: >
  Смоук-тест интеграции v1.3, не боевой прогон: 2 сегмента панели hairloss_demo
  (naturalniki_bez_khimii — приверженцы натуральных средств, скептики к химии;
  razocharovannye_veterany — хронические разочарованные, уставшие от громких
  обещаний), 4 нейтральных демо-стимула равной силы, 4 профиля на сегмент (8
  профилей всего) × 2 независимых генерации. Ожидаемый результат прогона —
  не рейтинг N1-N4 (не предмет интереса), а вердикт самоконтроля: плацебо
  обязано финишировать в нижней трети КАЖДОГО сегмента, пара-ловушка обязана
  остаться "в пределах шума" относительно оригинала. Если хотя бы один из этих
  двух пунктов не выполнен — прогон помечается controls_failed, и это тоже
  валидный, ожидаемый диагностический результат смоук-теста (не повод объявлять
  прогон неудавшимся технически), просто требует разбора причины перед боевым
  использованием контролей на реальных исследованиях.
