# 01_segments_merged.yaml — объединение 3 независимых прогонов сегментации
# (01_segmentation_run1.md..run3.md) по правилам spec_synthetic-panel_v1.1_segment_map.md
# §2, стадия 1.2 (сопоставление по мотивации+поведению, не по названию).
# Схема — зафиксирована в scripts/segments_export.py (docstring load_merged_segments/build_segment_yaml).
#
# independence: approximated — прогоны 1-3 выполнены ПОСЛЕДОВАТЕЛЬНО в одном
# контексте одним агентом (демо/пилот, см. 01_segmentation_run3.md, раздел
# «Примечание к независимости прогонов»); это ограничение зафиксировано и в
# manifest.json, и явно в cjm_report.md — не боевой режим (требует отдельных
# субагентов/API-вызовов).

cjm_study: cjm_hairloss_demo
runs_for_stability: 3
generated_at: "2026-07-10T00:30:00+00:00"

