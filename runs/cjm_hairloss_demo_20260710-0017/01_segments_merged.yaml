# волос» проявила довольно высокую устойчивость к пересегментации одним и тем
# же поведенческо-мотивационным подходом. Ещё 2 сегмента воспроизвелись в 2 из
# 3 прогонов. Только 2 сегмента оказались специфичны для одного прогона each
# (сезонность, постболезненное/медикаментозное выпадение) — оба тематически
# правдоподобны как реальные ниши категории, но недостаточно устойчивы для
# ядра при ЭТОМ размере выборки прогонов (n=3). Итоговое ядро — 8 сегментов,
# в пределах целевого диапазона [5, 12] из studies/cjm_hairloss_demo.yaml, но
# число НЕ подгонялось под диапазон — это результат объединения, не входное
# требование (см. правило §2, стадия 1.2, п.5).
#
# ОГОВОРКА (см. также 01_segmentation_run3.md, «Примечание к независимости
# прогонов»): independence = approximated, не full — это демо-приближение,
# наблюдаемая устойчивость может отчасти отражать то, что все три прогона
# выполнил один и тот же агент в одной сессии, а не только объективную
# структуру категории. Для боевой сдачи клиенту нужны раздельные
# субагенты/API-вызовы на каждый прогон.
