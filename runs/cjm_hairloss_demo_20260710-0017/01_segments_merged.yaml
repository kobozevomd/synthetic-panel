  - id: molodye_mamy_posle_rodov
    name: "Молодые мамы после родов"
    stability: "3/3"
    trust: "🟢"
    source: "модельное качественное (LLM-сегментация, 3 независимых прогона, без соцлистенинга)"
    source_runs: [run1, run2, run3]

    description: >
      Женщины в первый год после родов, столкнувшиеся с заметным послеродовым
      выпадением волос (типичный пик — 2-4 месяц после родов). Воспринимают
      проблему как временную и гормонально объяснимую, но эмоционально всё
      равно тревожатся при каждом эпизоде выпадения — это часть более общего
      желания «вернуть себя прежнюю» на фоне множества одновременных
      изменений после родов. Главный сдерживающий фактор — неуверенность,
      можно ли использовать активные средства во время грудного вскармливания;
      сегмент систематически откладывает решение до конца ГВ, если не находит
      однозначного и понятного ответа про безопасность. Ищут максимально
      простое решение — не ритуал из нескольких шагов, а одно понятное
      действие.

    axes:
      hair_loss_anxiety: выше среднего
      trust_in_active_ingredients: средняя
      routine_readiness: низкая
      price_sensitivity: средняя
      topic_openness: ниже среднего
      quick_result_expectation: средняя
      self_treatment_vs_doctor: выше среднего

    behavior:
      formats: ["мягкие вспомогательные формы (шампунь/сыворотка с щадящим составом) — приоритет из-за ГВ", "витаминно-минеральные комплексы для восстановления после родов"]
      occasions: ["уход в первые месяцы после родов", "момент обнаружения выпадения на расчёске/в сливе"]
      channels: ["мамские чаты и форумы", "вопрос гинекологу/педиатру между делом", "поиск по ночам во время кормления"]
      price_sensitivity: >
        Не основной барьер сам по себе — важнее подтверждённая безопасность при
        ГВ, чем цена; готовы заплатить за понятную гарантию безопасности состава.

    language:
      - "Знаю, что должно пройти, но смотреть на клок волос всё равно неприятно"
      - "Если что-то использовать — то только то, что точно не скажется на кормлении"
      - "Хочу снова чувствовать себя собой"
      - "Сейчас не до сложных ритуалов, нужно одно простое решение"
      - "Неловко жаловаться на такую мелочь на фоне забот о ребёнке"

    persona_jitter:
      age: [23, 38]
      income_level: [average, above_average]
      city_tier: [million_plus, big_city, mid_city]

    brands_context: >
      Открытая ниша для ДемоБренда: явного лидера, ассоциирующегося именно с
      «безопасно при ГВ», в этой демо-категории не определено — позиционирование
      через прозрачность состава и явное указание совместимости с грудным
      вскармливанием может стать дифференциатором (не количественная оценка
      доли рынка — качественное наблюдение).

    motivation: "Вернуть волосы (и вместе с ними ощущение «себя прежней») к состоянию до беременности, не как отдельная цель, а часть общего восстановления после родов."
    barrier: "Неуверенность, безопасно ли использовать активное средство во время грудного вскармливания — сомнение перевешивает желание действовать немедленно."
    jtbd: "Убери ещё один источник тревоги в и без того нестабильный период жизни, но без риска для ребёнка и без затрат сил, которых сейчас ни на что не хватает."
    matrix:
      pain: "Эмоциональная (страх не вернуть себя прежнюю) и функциональная (заметное выпадение клочьями на 2-4 месяце после родов)."
      barrier: "Сомнение в безопасности состава при кормлении + нехватка времени и сил на сложный уход."
      behavior: "Ночной поиск информации во время кормления, вопросы в мамских чатах, между делом — врачу."
      solution: "Максимально простой и «доказанно безопасный» вариант; частая стратегия — отложить решение до конца ГВ."
    unique_insights:
      - "Знает рационально, что выпадение временное и гормональное, но эмоционально тревожится при каждом визуальном напоминании."
      - "Стесняется поднимать тему как значимую проблему на фоне более «важных» забот о ребёнке."
    psych_trigger: "Вид большого количества волос на расчёске или в сливе — быстрая смена «я знаю, это пройдёт» на «а вдруг в этот раз не пройдёт»."
    quotes:
      - text: "Вроде читала, что после родов это нормально, но когда видишь клок волос в руке — все равно страшно"
        source: "синтетическая иллюстрация"
      - text: "Сейчас не до сложных ритуалов, нужно что-то одно и чтобы точно не навредило при кормлении"
        source: "синтетическая иллюстрация"
      - text: "Хочется снова чувствовать себя собой, а не только мамой в вечном недосыпе"
        source: "синтетическая иллюстрация"
    size_estimate: "вероятно один из крупных сегментов категории (оценка, не измерение)"

