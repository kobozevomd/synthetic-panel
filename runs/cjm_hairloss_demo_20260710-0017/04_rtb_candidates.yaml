# 04_rtb_candidates.yaml — RTB-кандидаты стадии 4 (spec_synthetic-panel_v1.1_segment_map.md
# §2, стадия 4; формула — cjm_prompts_ru.md §4.1). Форма А (общий пул) — рекомендуемая
# по умолчанию: 4 ОБЩИХ стимула тестируются на ОБОИХ сегментах ядра, прошедших
# полный CJM (DoD §5.2: "4 RTB-кандидата x 2 сегмента x 10 респондентов x 2 сэмпла").
#
# Статус ДО SSR-теста: 🟡 гипотеза для проверки (см. cjm_report_template.md §6.1).
# Ни один кандидат не содержит придуманной точности доказательства (конкретных
# цифр участников исследований, процентов эффективности) — правило §4.1.

segments: [molodye_mamy_posle_rodov, muzhchiny_rannee_poredenie]

rtb_candidates:
  - id: rtb1
    text: >-
      Если переживаете, что активный уход может быть слишком агрессивным
      именно сейчас, ДемоБренд предлагает бережную поддержку волос благодаря
      формуле с растительными экстрактами, которая укрепляет волосяные
      фолликулы, не перегружая их синтетическими компонентами.
  - id: rtb2
    text: >-
      Если вы уже разочаровались в громких обещаниях «заново за месяц»,
      ДемоБренд не обещает чуда — он поддерживает волосы благодаря составу,
      который работает на укрепление структуры волоса изнутри, и честно
      говорит о постепенном, а не мгновенном результате.
  - id: rtb3
    text: >-
      Если не хочется превращать уход за волосами в отдельный сложный ритуал
      или разговор с кем-либо, ДемоБренд — это одно простое действие внутри
      привычного ухода, разработанное с учётом рекомендаций специалистов по
      уходу за волосами, без лишних шагов и лишнего внимания к теме.
  - id: rtb4
    text: >-
      Если для вас важно понимать, что именно вы наносите на кожу головы,
      состав ДемоБренд полностью прозрачен и построен на растительных
      активных компонентах, действие каждого из которых объяснено просто, без
      сложных терминов и голых обещаний.

# Целевой барьер / benefit / тип RTB на кандидата — для секции 6.1 cjm_report.md
# (перенос сюда как комментарий-справка; сама эта секция yaml не парсится
# скриптами построчно за пределами id/text, см. cjm_to_study.py normalize_candidates).
#
# rtb1: барьер «тревога о безопасности/агрессивности состава» -> benefit «бережная эффективная поддержка» -> тип «механизм действия (растительные экстракты)»
# rtb2: барьер «усталость от громких обещаний, недоверие после неудач» -> benefit «честный постепенный результат» -> тип «механизм действия + честность ограничений»
# rtb3: барьер «нежелание обсуждать тему / сложный ритуал» -> benefit «простота, дискретность использования» -> тип «рекомендация специалистов (тип авторитета, без чисел)»
# rtb4: барьер «недоверие к синтетическому составу» -> benefit «прозрачность состава» -> тип «прозрачность/объяснение состава»
