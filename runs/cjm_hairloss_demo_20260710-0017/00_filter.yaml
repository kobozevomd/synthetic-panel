# Машиночитаемый компаньон 00_filter.md (spec_synthetic-panel_v1.1_segment_map.md §2,
# схема cjm_prompts_ru.md стадия 0). Не потребляется скриптами механически в v1.1 —
# служит входом для стадии 1 (список excluded_segments) и для сборки cjm_report.md.

category: "средства от выпадения волос"
brand: "ДемоБренд (вымышленный)"
vertical: pharma_otc

instruction_source:
  status: обобщённая_демо        # предоставлена | найдена_веб | обобщённая_демо
  path_or_url: null              # нет ни файла, ни URL — обобщённая типовая инструкция категории
  accessed_at: null
  trust: "🔴"                     # 🔴, т.к. обобщённая/демо, не инструкция конкретного препарата

allowed_audience:
  - "Взрослые 18+ (мужчины и женщины) с бытовым/сезонным/стрессовым/возрастным поредением или истончением волос"
  - "Взрослые без острых заболеваний кожи головы, подтверждённой непереносимости компонентов"
  - "Взрослые вне беременности/лактации (для активных форм)"
  - "Взрослые без явных признаков, но с профилактической мотивацией (семейная предрасположенность, тревога о состоянии волос)"

not_recommended:
  - "Беременные/кормящие — для форм с активными синтетическими компонентами (мягкие растительные шампуни возможно исключение — требует проверки состава конкретного препарата)"
  - "Люди с диффузным выпадением без диагностики причины — рекомендована, не обязательна, параллельная консультация трихолога/эндокринолога"

excluded_segments:
  - "Дети/подростки до 18 лет"
  - "Беременные/кормящие как целевой сегмент продвижения активных форм"
  - "Люди с острыми заболеваниями кожи головы, ищущие лечение через космецевтику вместо дерматолога"

rx_warning_included: false
