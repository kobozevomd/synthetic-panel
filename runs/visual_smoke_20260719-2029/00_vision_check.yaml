- image_path: /Users/romankobozev/Documents/Claude/Projects/Синтетические ИИ-панели/synthetic-panel/studies/assets/visual_smoke/demo_a_minimalist_sulfate_free.png
  stimulus_ids:
  - A
  key_element_by_stimulus:
    A: БЕЗ СУЛЬФАТОВ
  description: >-
    Флакон шампуня на светлом кремовом/бежевом фоне, минималистичный дизайн.
    Матовый флакон бежево-белого цвета с крышкой из матового светлого материала
    (оттенок светлого дерева/бежевого пластика). Над названием бренда — тонкий
    контурный значок в виде листа, нарисованный одной зелёной линией (символ
    натуральности). Название бренда «ДемоБренд» набрано разреженным тонким
    шрифтом с засечками (антиква), тёмно-зелёным цветом; под ним — тонкая
    горизонтальная линия-разделитель. Ниже курсивом мелким шрифтом — слово
    «шампунь». В центре флакона — крупная жирная надпись в две строки
    тёмно-зелёным, почти чёрным цветом: «БЕЗ СУЛЬФАТОВ» — самый заметный
    текстовый элемент всего макета по размеру шрифта. Сразу под ней курсивом
    мельче: «мягкая формула для чувствительной кожи головы». В нижней части
    флакона — мелкая подпись «растительные экстракты · без силиконов». Общая
    палитра — кремовый/бежевый/тёмно-зелёный, много пустого пространства,
    никаких ярких цветов, градиентов или графических украшений кроме тонкого
    контурного листа. Никаких фотографий людей или продукта в действии.
  key_element_recognized: true
- image_path: /Users/romankobozev/Documents/Claude/Projects/Синтетические ИИ-панели/synthetic-panel/studies/assets/visual_smoke/demo_b_bright_double_volume.png
  stimulus_ids:
  - B
  key_element_by_stimulus:
    B: ДВОЙНОЙ ОБЪЁМ
  description: >-
    Флакон на ярком фоне с диагональным градиентом от малиново-розового
    (вверху) к оранжевому (внизу); позади флакона — расходящиеся из одной
    точки светлые тонкие лучи, эффект «вспышки/всплеска». Флакон белый,
    глянцевый, с жёлтой крышкой и жёлтой контурной окантовкой корпуса. На
    самом флаконе — крупная прямоугольная этикетка насыщенного
    малиново-пурпурного цвета с жёлтой рамкой. На этикетке белым жирным
    шрифтом название бренда «ДемоБренд»; ниже — очень крупная надпись
    жёлтыми заглавными буквами в две строки «ДВОЙНОЙ ОБЪЁМ» — самый крупный
    и визуально доминирующий текст на макете; под ней белым текстом помельче
    «волосам каждый день!». Справа, частично перекрывая край этикетки и
    белый корпус флакона, — круглый жёлтый бейдж-стикер с тёмно-красной
    надписью «×2» и словом «ОБЪЁМ» под ней. В нижней части макета, уже на
    оранжевом фоне под флаконом, — белая надпись «формула с коллагеном для
    мгновенного объёма». Общее впечатление — яркое, динамичное, контрастные
    насыщенные цвета (малиновый/оранжевый/жёлтый/белый), никакой сдержанности
    в композиции, много визуальной энергии (лучи, крупные буквы, круглый
    бейдж).
  key_element_recognized: true
- image_path: /Users/romankobozev/Documents/Claude/Projects/Синтетические ИИ-панели/synthetic-panel/studies/assets/visual_smoke/demo_c_clinical_tested.png
  stimulus_ids:
  - C
  key_element_by_stimulus:
    C: КЛИНИЧЕСКИ ПРОТЕСТИРОВАНО
  description: >-
    Флакон на чисто белом фоне, строгий, «аптечный»/клинический стиль. Сверху
    и снизу всего изображения — сплошные тёмно-синие горизонтальные полосы.
    Флакон белый с прямоугольной тёмно-синей крышкой и тонким тёмно-синим
    контуром корпуса. Название бренда «DEMOBRAND» дано латиницей, заглавными
    буквами с разрядкой между буквами, тёмно-синего цвета; под ним — тонкая
    синяя разделительная линия и серая подпись «дерматологическая линия».
    Ниже, по центру — круглая эмблема-печать: двойной тонкий синий контур
    (кольцо в кольце), внутри — крупная синяя галочка (чек-марк), похоже на
    сертификационный знак/знак одобрения. Под печатью — крупная жирная
    надпись синим заглавными буквами в две строки: «КЛИНИЧЕСКИ
    ПРОТЕСТИРОВАНО» — самый крупный текст на макете. Под ней серым текстом
    мельче: «под контролем врачей-дерматологов, независимая лаборатория».
    Ниже расположена прямоугольная таблица-плашка с тонкими горизонтальными
    разделителями и тремя строками мелкого текста: «переносимость кожей
    головы — исследование, n=104», «гипоаллергенность подтверждена», «без
    отдушек-раздражителей». В самом низу флакона — мелкая подпись «состав
    опубликован · номер серии на упаковке». Цветовая палитра ограничена
    белым, тёмно-синим (навy) и серым — никаких тёплых или ярких цветов;
    много прямых линий, рамок и таблично организованного текста, общее
    ощущение — медицинская/лабораторная упаковка, а не косметическая.
  key_element_recognized: true
