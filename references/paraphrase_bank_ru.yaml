# ============================================================================
# БАНК ПАРАФРАЗОВ ДЛЯ RANK-RECOVERY SSR — русский язык (spec_synthetic-panel_v1.4.md §2.1)
# ============================================================================
#
# ЧТО ЭТО И ЗАЧЕМ. До этого файла rank-recovery (условие (в) гейта scripts/test_anchors.py)
# проверялся на банке PARAPHRASE_BANK, зашитом в сам test_anchors.py: 3-4 фразы на уровень,
# все написаны ОДНИМ автором (тем же, что писал и сами anchor_sets в anchors_ru.yaml).
# docs/review_v1.3.md (находка №2, MAJOR) честно зафиксировал: такой банк статистически
# некрепок — маленькая выборка на уровень чувствительна к формулировкам одного конкретного
# автора, и независимая проверка (F1, тем же ревью) собственным банком из 3 фраз/уровень
# получила ДРУГОЙ вердикт по паре шкала×эмбеддер, чем банк B2 (см. §1.2 review_v1.3.md).
# Из-за этого docs/embedder_ab_v13.md называл rank-recovery "ориентировочным" — формально
# гейт (код) уже был жёстким (rank_recovery.monotonic участвует в ScaleGateResult.passed
# наравне с условиями (а)/(б)), но эпистемически слабым: PASS на 3-4 фразах/уровень одного
# автора не давал уверенности, что шкала обобщается за пределы конкретных обучающих фраз.
#
# Этот файл — устранение находки №2: ≥10 фраз НА КАЖДЫЙ уровень НА КАЖДУЮ шкалу (в 2.5-3
# раза больше данных на точку, чем было), с осознанным разнообразием РЕГИСТРА (поле `style`
# у каждой фразы, см. ниже) — не только лексическое разнообразие, но и разнообразие того,
# КАК разные люди вообще формулируют мысль (коротко/развёрнуто, сдержанно/эмоционально).
# scripts/test_anchors.py загружает этот файл как ЕДИНСТВЕННЫЙ источник данных для
# rank-recovery (см. load_paraphrase_bank) — старый зашитый PARAPHRASE_BANK удалён, не
# оставлен как fallback (единый источник правды, как и для anchors_ru.yaml/placebo_bank_ru.yaml).
#
# ГЛАВНОЕ ПРАВИЛО НЕЗАВИСИМОСТИ (без него rank-recovery был бы циркулярным — проверял бы
# "узнаёт ли модель фразу саму себя/лексику автора якорей", а не обобщение шкалы на текст,
# сформулированный независимо). Каждая фраза здесь обязана НЕ ПЕРЕСЕКАТЬСЯ с лексикой
# references/anchors_ru.yaml (v2, вся) на уровне ЗНАЧИМЫХ (не служебных) НОРМАЛИЗОВАННЫХ
# СЛОВОФОРМ — лемма-уровень не требуется (то есть "покупка" и "куплю" технически разные
# словоформы и не считаются пересечением, хотя однокоренные — см. docstring
# scripts/test_anchors.py::check_no_anchor_lexicon_overlap за точным алгоритмом и списком
# служебных слов, исключённых из проверки). Проверка программная, не "на глаз" — гейт
# scripts/test_anchors.py::TestParaphraseBankIntegrity.test_paraphrase_bank_has_no_anchor_lexicon_overlap
# держит это свойство как регресс; результат прогона на момент сборки — docs/rank_recovery_v14.md.
#
# Остальные требования к каждой фразе — ТЕ ЖЕ грамматические правила, что и для anchor_sets
# (см. references/anchors_ru.yaml, преамбула), С ОДНИМ послаблением для регистров `краткий`/
# `развёрнутый` (см. ниже):
#   - естественный разговорный русский, НЕ калька с английского;
#   - от первого лица или безличная конструкция, подразумевающая говорящего;
#   - ~5-12 слов для регистров разговорный/сдержанный/эмоциональный; `краткий` короче (часто
#     2-6 слов — это и есть смысл регистра), `развёрнутый` длиннее (часто 15-25 слов — тоже
#     осознанная часть регистра, а не нарушение правила длины);
#   - без названий брендов, категорий или продуктовых свойств — шкалы доменно-независимые;
#   - грамматически безопасно для любого пола говорящего: НЕ использовать прошедшее время
#     смыслового глагола 1-го лица и краткие прилагательные, согласуемые с родом говорящего
#     ("купил/купила", "готов/готова", "рад/рада", "уверен/уверена" и т.п. — запрещены везде,
#     включая варианты через слэш или скобки). Разрешены настоящее/будущее время, безличные
#     конструкции ("мне доводилось", "получается представить") и согласование с НЕОДУШЕВЛённым
#     существительным грамматического рода, не связанным с полом говорящего (например
#     "взгляд мог бы зацепиться" — "мог бы" согласуется с "взгляд", не с говорящим).
#
# ПОЛЕ `style` (обязательно на каждой фразе, распределено осознанно — ровно 2 фразы каждого
# из 5 стилей на каждый уровень каждой шкалы, порядок ниже везде одинаков: разговорный,
# разговорный, сдержанный, сдержанный, эмоциональный, эмоциональный, краткий, краткий,
# развёрнутый, развёрнутый):
#   - "разговорный"  — бытовая речь, частицы ("ну", "короче", "как-то"), неполные конструкции;
#   - "сдержанный"   — спокойный, чуть более официальный регистр, минимум экспрессии;
#   - "эмоциональный" — восклицания, усилители, многоточия/яркая пунктуация;
#   - "краткий"      — минимум слов, часто одно короткое предложение;
#   - "развёрнутый"  — многосоставное предложение, поясняет ход мысли, длиннее остальных.
# Смысл разнообразия регистров тот же, что у разных `label`-наборов в anchors_ru.yaml (см.
# комментарий там про усреднение по наборам) — но здесь это не отдельные усредняемые PMF-
# наборы (rank-recovery скорится ПОЛНЫМ ансамблем, без leave-one-out, см. test_anchors.py),
# а защита от того, что вся выборка на уровень написана в одном-единственном регистре и
# случайно совпадает по синтаксису с тем, как сформулированы сами anchor_sets.
#
# Схема:
#   meta: {version, min_phrases_per_level, styles, language}
#   scales:
#     <scale_id>:               # совпадает с discover_scale_ids(anchors_ru.yaml)
#       levels:
#         <1..5>:
#           - text: str
#             style: str         # один из meta.styles
#
# min_phrases_per_level = 10 — гейт scripts/test_anchors.py::load_paraphrase_bank проверяет
# это число программно при загрузке (ValueError, если банк ужали ниже минимума при правке).

meta:
  version: 1
  min_phrases_per_level: 10
  styles: [разговорный, сдержанный, эмоциональный, краткий, развёрнутый]
  language: ru

scales:

  # ==========================================================================
  purchase_intent:
    levels:
      1:
        - text: "Не, ну на это я точно тратиться не собираюсь."
          style: "разговорный"
        - text: "Да ну, разглядывать это совсем не хочу."
          style: "разговорный"
        - text: "Для меня это не вариант, платить за такое поводов не нахожу."
          style: "сдержанный"
        - text: "Деньги на это тратить не планирую, повода нет."
          style: "сдержанный"
        - text: "Ужас, вообще не моё, думать об этом совсем не хочу!"
          style: "эмоциональный"
        - text: "Ну уж нет, деньги на это будто на ветер выброшу, ни за что!"
          style: "эмоциональный"
        - text: "Нет, и точка, деньги в другое место."
          style: "краткий"
        - text: "Не вариант вообще, интерес отсутствует."
          style: "краткий"
        - text: "Если совсем откровенно, у меня просто нет ни малейшего повода тратить на это деньги."
          style: "развёрнутый"
        - text: "В теории не получается представить, что деньги на подобное окажутся потрачены именно мной."
          style: "развёрнутый"
      2:
        - text: "Ну наверное не в этот раз, но вдруг ещё передумаю."
          style: "разговорный"
        - text: "Скорее всего деньги на это не потрачу, разве что при особом раскладе всё изменится."
          style: "разговорный"
        - text: "Настрой скорее отрицательный, шанс есть, но совсем скромный."
          style: "сдержанный"
        - text: "Склоняюсь к отказу, хотя для себя это ещё не закрыто."
          style: "сдержанный"
        - text: "Как-то не манит совсем, скорее нет, чем да!"
          style: "эмоциональный"
        - text: "Настроение больше «нет», если судить по первым ощущениям!"
          style: "эмоциональный"
        - text: "Скорее нет, чем да."
          style: "краткий"
        - text: "Не горю особо, но не исключаю."
          style: "краткий"
        - text: "Стремления купить это у меня немного, хотя совсем не исключаю, что при других обстоятельствах отношение поменяется."
          style: "развёрнутый"
        - text: "Если разбираться внутри себя, перевес явно в пользу отказа, но скромная вероятность передумать всё же остаётся."
          style: "развёрнутый"
      3:
        - text: "Ну прямо не пойму, тут пятьдесят на пятьдесят."
          style: "разговорный"
        - text: "Могу и купить, а могу передумать, короче как получится."
          style: "разговорный"
        - text: "Определённого мнения ещё нет, доводы находятся и за, и против."
          style: "сдержанный"
        - text: "Взвешиваю все за и против, определённого перевеса не нахожу."
          style: "сдержанный"
        - text: "Ух, вот прямо разрываюсь между да и нет!"
          style: "эмоциональный"
        - text: "И манит, и отпугивает одновременно — вот такое смешанное чувство!"
          style: "эмоциональный"
        - text: "Пятьдесят на пятьдесят."
          style: "краткий"
        - text: "Определённости совсем нет."
          style: "краткий"
        - text: "Если посмотреть под одним углом, что-то в этом привлекает, а под другим — не хватает решимости назвать это чётким «да»."
          style: "развёрнутый"
        - text: "Если разложить по полочкам все аргументы, получается примерно поровну, поэтому чёткий ответ дать никак не выходит."
          style: "развёрнутый"
      4:
        - text: "В общем-то за, но пару деталей хочу ещё уточнить."
          style: "разговорный"
        - text: "Скорее да, но не без пары уточнений напоследок."
          style: "разговорный"
        - text: "Настрой в основном положительный, есть только одна оговорка."
          style: "сдержанный"
        - text: "Больше склоняюсь к покупке, но финальный вывод делать всё же рано."
          style: "сдержанный"
        - text: "О, прямо подмывает купить, но маленький червячок сомнения гложет!"
          style: "эмоциональный"
        - text: "Загораюсь этой идеей, но одно «но» всё же держит!"
          style: "эмоциональный"
        - text: "Скорее да, но с нюансом."
          style: "краткий"
        - text: "В основном за, но не без сомнения."
          style: "краткий"
        - text: "Общий настрой положительный, деньги на это, скорее всего, потрачу, хотя одна деталь всё же заставляет притормозить перед решающим шагом."
          style: "развёрнутый"
        - text: "Если коротко: за, но с одним уточнением — сперва нужно прояснить пару деталей, прежде чем расставаться с деньгами."
          style: "развёрнутый"
      5:
        - text: "Всё, оформляю не глядя, тут и думать нечего!"
          style: "разговорный"
        - text: "Ну это вообще без вариантов, деньги уже почти потрачены!"
          style: "разговорный"
        - text: "Решение принято, покупка обязательно состоится."
          style: "сдержанный"
        - text: "Здесь всё предельно ясно, деньги на это точно уйдут."
          style: "сдержанный"
        - text: "Да!! Оформляю без промедления, никаких сомнений!"
          style: "эмоциональный"
        - text: "Обожаю, деньги на это отдам с огромным удовольствием!"
          style: "эмоциональный"
        - text: "Да, оформляю."
          style: "краткий"
        - text: "Без вариантов, покупаю."
          style: "краткий"
        - text: "Тут и правда всё решено внутри меня: деньги на это будут потрачены с удовольствием и без единого сомнения."
          style: "развёрнутый"
        - text: "Если говорить максимально прямо: это стопроцентное да, покупка для меня дело почти решённое с самого начала."
          style: "развёрнутый"

  # ==========================================================================
  appeal:
    levels:
      1:
        - text: "Не, вообще никак не цепляет, от слова совсем."
          style: "разговорный"
        - text: "Ну реально совсем не моё это всё."
          style: "разговорный"
        - text: "Внешне это меня не привлекает, внутри всё остаётся неподвижным."
          style: "сдержанный"
        - text: "Реакция почти никакая, глаз на этом не задерживается."
          style: "сдержанный"
        - text: "Бее, вообще не моё, глаз аж спотыкается!"
          style: "эмоциональный"
        - text: "Раздражает с первой же секунды, реально коробит!"
          style: "эмоциональный"
        - text: "Совсем не моё."
          style: "краткий"
        - text: "Глаз не радует."
          style: "краткий"
        - text: "Если внимательно посмотреть, здесь не находится ни единой детали, за которую взгляд мог бы удержаться — внутри стоит абсолютная пустота."
          style: "развёрнутый"
        - text: "Гляжу и не понимаю, что здесь вообще должно было привлечь внимание — для меня это пустое место."
          style: "развёрнутый"
      2:
        - text: "Ну как-то не то чтобы прямо цепляет."
          style: "разговорный"
        - text: "Как-то не очень, без изюминки какой-то."
          style: "разговорный"
        - text: "Реакция скорее сдержанная, есть что-то, но совсем немного."
          style: "сдержанный"
        - text: "Скорее отношусь к этому равнодушно, хотя совсем без интереса не назову."
          style: "сдержанный"
        - text: "Ну такое, без огонька совсем!"
          style: "эмоциональный"
        - text: "Чуть-чуть манит, но реально не более того!"
          style: "эмоциональный"
        - text: "Слабенько, но что-то есть."
          style: "краткий"
        - text: "Едва заметный интерес, не больше."
          style: "краткий"
        - text: "Что-то в этом определённо есть, но интерес, если совсем откровенно, очень поверхностный и скоро угасает."
          style: "развёрнутый"
        - text: "Глаз задерживается буквально на секунду, а дальше внимание соскальзывает дальше само собой."
          style: "развёрнутый"
      3:
        - text: "Ну норм, короче, ни туда ни сюда."
          style: "разговорный"
        - text: "Ну, обычное дело, и всё тут."
          style: "разговорный"
        - text: "Отношусь к этому нейтрально, не нахожу явных достоинств или недостатков."
          style: "сдержанный"
        - text: "Ни явного интереса, ни явного неприятия не ощущаю."
          style: "сдержанный"
        - text: "Ни туда, ни сюда — прямо ровно посередине!"
          style: "эмоциональный"
        - text: "Совсем никак, ни радости, ни раздражения!"
          style: "эмоциональный"
        - text: "Ни то ни сё."
          style: "краткий"
        - text: "Нейтрально совсем."
          style: "краткий"
        - text: "Если пытаться разобраться в своих ощущениях, здесь нет ни явного достоинства, ни явного недостатка — состояние тихого, устойчивого равновесия."
          style: "развёрнутый"
        - text: "Гляжу на это без выраженных чувств, ни неприятия, ни увлечения внутри не возникает."
          style: "развёрнутый"
      4:
        - text: "В общем норм, прицепиться прямо не к чему, хотя огонька чуть не хватает."
          style: "разговорный"
        - text: "Мне такое заходит, но один пунктик немного смущает."
          style: "разговорный"
        - text: "В основном положительное отношение, но есть один нюанс."
          style: "сдержанный"
        - text: "Скорее вызывает симпатию, хотя не без маленькой шероховатости."
          style: "сдержанный"
        - text: "О, симпатично, аж глаз радуется, только пара деталей смущает!"
          style: "эмоциональный"
        - text: "Загораюсь этим, но капелька сомнения всё же портит картину!"
          style: "эмоциональный"
        - text: "Симпатично, но с нюансом."
          style: "краткий"
        - text: "Почти идеально, но не совсем."
          style: "краткий"
        - text: "В основном мне это по душе, глаз радуется, хотя одна деталь всё же не даёт поставить наивысшую оценку."
          style: "развёрнутый"
        - text: "Симпатия определённо есть и довольно ощутимая, но какой-то один штрих всё же немного портит общую картину для меня."
          style: "развёрнутый"
      5:
        - text: "Это прямо вау, влюбляюсь с первого взгляда!"
          style: "разговорный"
        - text: "Огонь просто, вот это по мне!"
          style: "разговорный"
        - text: "Симпатия очень сильная, без каких-либо сомнений."
          style: "сдержанный"
        - text: "Реакция максимально положительная, это определённо мне по душе."
          style: "сдержанный"
        - text: "Обожаю просто, глаз не могу отвести!"
          style: "эмоциональный"
        - text: "Это невероятно красиво, влюбляюсь мгновенно!"
          style: "эмоциональный"
        - text: "Обожаю, вот прямо да."
          style: "краткий"
        - text: "Влюбляюсь тут же."
          style: "краткий"
        - text: "Симпатия настолько сильная, что глаз буквально не могу отвести — это определённо один из самых удачных вариантов, что мне доводилось видеть."
          style: "развёрнутый"
        - text: "Реакция абсолютно однозначная: обожаю каждую деталь, и ни единого «но» здесь для меня просто не существует."
          style: "развёрнутый"

  # ==========================================================================
  relevance:
    levels:
      1:
        - text: "Не, это вообще какая-то другая жизнь, ко мне это не относится."
          style: "разговорный"
        - text: "Да ну, вообще не обо мне это всё."
          style: "разговорный"
        - text: "Ко мне это не имеет ни малейшего отношения, совершенно другой опыт."
          style: "сдержанный"
        - text: "Себя в этом не нахожу совсем, это определённо не про меня."
          style: "сдержанный"
        - text: "Вообще никакой связи с моей повседневностью, это будто про кого-то другого!"
          style: "эмоциональный"
        - text: "Ха, вот уж точно не обо мне, ни капли похожего нет!"
          style: "эмоциональный"
        - text: "Не обо мне вообще."
          style: "краткий"
        - text: "Совсем другой опыт у меня."
          style: "краткий"
        - text: "Если разбираться подробно, я не нахожу здесь ни единой черты, которая описывала бы именно мою повседневность — это как будто про совершенно постороннего человека."
          style: "развёрнутый"
        - text: "Как ни старайся примерить это на себя, ровным счётом не сходится с моим личным опытом — стойкое ощущение, что речь совершенно не обо мне."
          style: "развёрнутый"
      2:
        - text: "Ну вот, есть пара деталей похожих, но в основном не моё."
          style: "разговорный"
        - text: "Скорее не моя тема, хотя кое-что отдалённо мелькает."
          style: "разговорный"
        - text: "В основном это не про меня, разве что пара деталей случайно перекликается."
          style: "сдержанный"
        - text: "Немного пересечений с моим опытом нахожу, но по большей части это чужой сюжет."
          style: "сдержанный"
        - text: "Ну не совсем моё, хотя парочка деталей прямо царапнула чем-то знакомым!"
          style: "эмоциональный"
        - text: "Слабенько откликается, будто краем глаза мелькает что-то смутно знакомое!"
          style: "эмоциональный"
        - text: "Разве что чуть-чуть похоже."
          style: "краткий"
        - text: "Почти не моё."
          style: "краткий"
        - text: "Если разбираться внимательно, пересечений с моей повседневностью почти нет, разве что пара второстепенных деталей случайно оказывается знакомой."
          style: "развёрнутый"
        - text: "По большому счёту это не мой опыт, хотя если очень постараться, можно найти пару отдалённых параллелей с чем-то из моей повседневности."
          style: "развёрнутый"
      3:
        - text: "Ну где-то да, где-то нет, пополам примерно."
          style: "разговорный"
        - text: "Отчасти моё, отчасти нет, если совсем прямо говорить."
          style: "разговорный"
        - text: "Наполовину нахожу здесь свой опыт, наполовину это про кого-то другого."
          style: "сдержанный"
        - text: "Где-то пересекается с моей повседневностью, где-то расходится совсем."
          style: "сдержанный"
        - text: "И моё, и не моё одновременно — вот такая двойственность!"
          style: "эмоциональный"
        - text: "Половина в яблочко, половина совсем не про меня — вот такой набор!"
          style: "эмоциональный"
        - text: "Пополам где-то."
          style: "краткий"
        - text: "И да, и нет."
          style: "краткий"
        - text: "Если раскладывать по пунктам, часть описания перекликается с моим опытом, а часть — нет, поэтому чёткого ответа здесь дать не получается."
          style: "развёрнутый"
        - text: "Если заходить с разных сторон: в одних вещах нахожу явное сходство с собой, в других — вообще не нахожу параллелей с собой."
          style: "развёрнутый"
      4:
        - text: "В общем-то это прям про меня, но парочка деталей не сходится."
          style: "разговорный"
        - text: "Ну да, нахожу себя тут, разве что кое-где не сходится."
          style: "разговорный"
        - text: "По большей части это описывает мой опыт, с одним нетипичным исключением."
          style: "сдержанный"
        - text: "В основном нахожу в этом себя, хотя пара деталей выбивается из общей картины."
          style: "сдержанный"
        - text: "О, это прямо обо мне, только один пунктик немного смущает!"
          style: "эмоциональный"
        - text: "Надо же, как узнаваемо, разве что мелкая деталь выбивается!"
          style: "эмоциональный"
        - text: "В основном моё."
          style: "краткий"
        - text: "Почти всё сходится, кроме пустяка."
          style: "краткий"
        - text: "По большому счёту это отражает мою повседневность, хотя один конкретный пункт заставляет меня добавить одно уточнение."
          style: "развёрнутый"
        - text: "Если оценивать в общем, я нахожу здесь много схожего со своей повседневностью, но пара мест всё же выбивается и требует отдельного уточнения."
          style: "развёрнутый"
      5:
        - text: "Это прямо один в один я, вообще без сомнений!"
          style: "разговорный"
        - text: "Ну это прям вот я, стопроцентно!"
          style: "разговорный"
        - text: "Это описывает меня предельно точно, без каких-либо расхождений."
          style: "сдержанный"
        - text: "Нахожу себя здесь полностью, до мельчайших деталей."
          style: "сдержанный"
        - text: "Это прямо зеркало какое-то, вот это я!"
          style: "эмоциональный"
        - text: "Надо же, это прямо моя жизнь один в один!"
          style: "эмоциональный"
        - text: "Это точно я."
          style: "краткий"
        - text: "Стопроцентно про меня."
          style: "краткий"
        - text: "Если разбирать по пунктам, каждая деталь здесь отражает мой личный опыт — большего попадания в мою повседневность и представить нельзя."
          style: "развёрнутый"
        - text: "Такое ощущение, что это написано специально обо мне: каждая деталь узнаваема, и ни единой точки расхождения я найти не могу."
          style: "развёрнутый"
