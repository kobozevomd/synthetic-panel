# references/placebo_bank_ru.yaml — банк плацебо-стимулов для негативных контролей
# (spec_synthetic-panel_v1.3.md §1.4, дефект Д5 "нет негативных контролей";
# spec_synthetic-panel_v1.4.md §2.2, контрастные плацебо, чинит находку №3 review_v1.3.md).
#
# Что это и зачем. run_study.py (owner — [B1]) при каждом прогоне (если controls
# не отключены study.yaml: `controls: off`) добавляет к РЕАЛЬНЫМ стимулам study.yaml
# ОДИН плацебо-стимул из банка ниже, выбранный ДЕТЕРМИНИРОВАННО от seed. Плацебо —
# заведомо пустой/слабый "клейм", не несущий никакого содержательного аргумента —
# любой вменяемый респондент (реальный или синтетический) обязан оценить его НИЖЕ
# настоящих стимулов. Плацебо, финиширующий НЕ в нижней трети рейтинга сегмента —
# сигнал, что измерение сломано (например, шкала утекла в промпт, эмбеддер не
# различает силу текста и т.п.) — прогон помечается `controls_failed` (см.
# run_study.py::compute_controls_verdict и report.py).
#
# НАХОДКА №3 (review_v1.3.md, MAJOR, ЧАСТИЧНО закрыта в v1.3 вероятностным правилом
# контролей, полностью — здесь): исходный банк (v1, ниже — `kind: neutral`) состоял
# ТОЛЬКО из плоских, фактологических утверждений о существовании продукта ("продукт
# существует и его можно купить") — нейтральный тон без всякой попытки убедить. Ревью
# показало реальный риск на реальном эмбеддере: НЕЙТРАЛЬНАЯ (не отвергающая) реакция
# персоны на такой плацебо-текст скорится ВЫШЕ, чем правдоподобная реакция на слабый,
# но настоящий стимул — потому что в самом плацебо-тексте нет никакого отрицательного
# содержания, от которого персона могла бы явно оттолкнуться. Контроль в исходном виде
# проверял только "распознаёт ли измерение пустоту, поданную СУХО", а не "распознаёт ли
# измерение пустоту, поданную УБЕДИТЕЛЬНО" — более реалистичный и более коварный случай
# (реальные пустые обещания в рекламе звучат тепло и уверенно, а не сухо-канцелярски).
#
# Поэтому каждое плацебо теперь несёт поле `kind`:
#   - "neutral"       — исходный банк v1 (плоская констатация факта существования,
#                        нейтральный/невраждебный тон, без попытки убедить);
#   - "irrelevant"     — внекатегорийная бессмыслица НЕЙТРАЛЬНЫМ тоном: правдоподобное,
#                        обыденное, верное утверждение, но ПОЛНОСТЬЮ не по теме продукта/
#                        покупки (например, факт о днях недели) — контроль на то, что
#                        персона (и измерение) не подтягивает случайную релевантность
#                        туда, где её нет, только потому что текст звучит спокойно и
#                        грамматически похож на клейм;
#   - "empty_promise"  — пустое обещание БЕЗ СОДЕРЖАНИЯ: грамматически и интонационно
#                        похоже на настоящий рекламный посыл (тёплый, уверенный,
#                        "продающий" тон), но не называет НИ ОДНОЙ конкретной выгоды,
#                        свойства или причины выбрать — это и есть сложный случай находки
#                        №3: убедительная ФОРМА при нулевом СОДЕРЖАНИИ.
# И "irrelevant", и "empty_promise" написаны ПРАВДОПОДОБНО-НЕЙТРАЛЬНО по стилю (обычная
# гладкая фраза, не абсурд и не бессвязный набор слов) — так, чтобы персона отбраковывала
# их (если отбраковывает) за ОТСУТСТВИЕ РЕЛЕВАНТНОГО СОДЕРЖАНИЯ, а не за странность самого
# ФОРМАТА (иначе контроль проверял бы распознавание глитча, а не распознавание пустоты).
#
# Требования к каждому плацебо (не нарушать при добавлении новых):
#   - грамматическая форма КЛЕЙМА (можно подставить как есть в любой claims_ranking/
#     concept_screening study.yaml — "Вот что тебе показывают: «<текст>»", см.
#     generate.py::build_task_prompt);
#   - ДОМЕННО-НЕЗАВИСИМЫЙ (без названий категорий/брендов/продуктовых свойств) —
#     работает для кофе, лекарств, авто, FMCG одинаково; слово "продукт" — нейтральный
#     плейсхолдер для kind=neutral/empty_promise, не зависящий от вертикали. kind=
#     irrelevant намеренно НЕ упоминает "продукт" вовсе (весь смысл — что текст не о
#     продукте и не о покупке в принципе, а не о другом продукте);
#   - НУЛЕВОЕ содержательное преимущество: не называет ни выгоды, ни свойства, ни
#     причины выбрать. Для kind=empty_promise это НАРОЧИТО замаскировано убедительной
#     интонацией — читатель должен долго искать содержание и не найти его, а не
#     почувствовать содержание с первой фразы;
#   - естественный разговорный русский (не калька, не канцелярит).
#
# Ротация: run_study.py выбирает ОДИН элемент детерминированно от
# (config.report.seed, study.name) — см. run_study.py::pick_placebo(). spec
# spec_synthetic-panel_v1.4.md §2.2 просит ротацию по умолчанию отдавать предпочтение
# КОНТРАСТНЫМ kind (irrelevant/empty_promise) — правка самой pick_placebo() и манифеста
# (фиксация выбранного kind) — зона [B1] (run_study.py), не этот файл; этот файл только
# поставляет данные с полем `kind`, уже готовым к такому отбору.
#
# Схема:
#   meta: {version: int, count: int}
#   placebos: [{id: str, text: str, kind: "neutral"|"irrelevant"|"empty_promise"}, ...]
#   Минимум по spec_synthetic-panel_v1.3.md §1.4: >= 3 плацебо любого kind (жёсткая
#   проверка — run_study.py::load_placebo_bank). Минимум по spec_synthetic-panel_v1.4.md
#   §2.2: >= 4 КОНТРАСТНЫХ (irrelevant + empty_promise, оба типа представлены) — здесь
#   их 6 (3 + 3), с запасом. Верхнего предела больше нет (v1.3 ограничивал банк 3-5 —
#   это ограничение снято этой правкой, оно противоречило требованию §2.2 расширить банк).

meta:
  version: 2
  count: 11

placebos:
  # --- kind: neutral (банк v1.3, без изменений содержания — только добавлено поле kind) ---
  - id: placebo_1
    kind: neutral
    text: "Этот продукт существует и его можно купить."
  - id: placebo_2
    kind: neutral
    text: "У нас есть такой продукт, и мы решили о нём рассказать."
  - id: placebo_3
    kind: neutral
    text: "Продукт выпускается и продаётся, как и многие другие подобные."
  - id: placebo_4
    kind: neutral
    text: "Мы предлагаем вам этот продукт, потому что он у нас есть."
  - id: placebo_5
    kind: neutral
    text: "Это обычный продукт, мы не обещаем ничего особенного."

  # --- kind: irrelevant (v1.4, §2.2) — правдоподобные, верные, но полностью не по теме ---
  - id: placebo_irrelevant_1
    kind: irrelevant
    text: "Понедельник наступает сразу после воскресенья."
  - id: placebo_irrelevant_2
    kind: irrelevant
    text: "У почтового ящика обычно есть небольшая щель для писем."
  - id: placebo_irrelevant_3
    kind: irrelevant
    text: "В сутках двадцать четыре часа, как и везде."

  # --- kind: empty_promise (v1.4, §2.2) — убедительная интонация, нулевое содержание ---
  - id: placebo_empty_promise_1
    kind: empty_promise
    text: "С этим продуктом вы получаете именно то, что вам нужно."
  - id: placebo_empty_promise_2
    kind: empty_promise
    text: "Это создано специально для таких, как вы."
  - id: placebo_empty_promise_3
    kind: empty_promise
    text: "Здесь есть всё, что для вас по-настоящему важно."
