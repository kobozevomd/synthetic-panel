# ============================================================================
# ЯКОРНЫЕ НАБОРЫ ДЛЯ SSR (Semantic Similarity Rating) — русский язык
# ============================================================================
#
# ГЛАВНОЕ ПРАВИЛО: тексты из anchor_sets НИКОГДА не показываются генерирующей
# модели (той, что отвечает "как персона"). Они используются ТОЛЬКО внутри
# ssr_core.py — сравниваются по косинусному сходству эмбеддингов с уже
# сгенерированным свободным текстом ответа. В промпт генерации (generate.py)
# идёт ТОЛЬКО поле `question` этой шкалы + стимул + персона. Если якорная
# фраза хоть раз попала в промпт генерации — это утечка шкалы, результат
# недействителен (см. references/methodology.md, раздел про запреты).
#
# Схема (для ssr_core.py / generate.py):
#   scales:
#     <scale_id>:                # id шкалы = значение study.yaml: question_scale
#       name_ru: str             # человекочитаемое имя шкалы
#       direction: str           # что значит 1 и что значит 5 (для report.py и людей)
#       question: str            # формулировка вопроса РЕСПОНДЕНТУ (идёт в промпт)
#       comment: str             # чем наборы ниже отличаются друг от друга
#       anchor_sets:              # список, len >= config.yaml: ssr.min_anchor_sets (4)
#         - label: str            # короткое имя регистра/стиля набора (для логов, не для промпта)
#           phrases:               # словарь {1: текст, 2: текст, 3: текст, 4: текст, 5: текст}
#             1: str               # самый слабый/отрицательный полюс шкалы
#             2: str
#             3: str               # нейтральная/промежуточная точка
#             4: str
#             5: str               # самый сильный/положительный полюс шкалы
#
# Требования к каждой фразе (обязательны, не нарушать при добавлении новых шкал):
#   - естественный разговорный русский, НЕ калька с английских reference-статей;
#   - от первого лица (или безличная конструкция, подразумевающая говорящего);
#   - 5-12 слов;
#   - без названий брендов, категорий или продуктов — шкалы доменно-независимые,
#     переиспользуются для любого стимула (клейм, концепт, упаковка, сообщение);
#   - монотонная градация силы внутри набора: 1 < 2 < 3 < 4 < 5;
#   - грамматически безопасно для любого пола говорящего (не использовать
#     прошедшее время смыслового глагола 1-го лица и краткие прилагательные,
#     согласуемые с родом говорящего — "купил/купила", "готов/готова" и т.п.;
#     разрешены формы настоящего/будущего времени и безличные конструкции).
#
# Смысл усреднения по нескольким наборам: одна и та же точка шкалы (например,
# "точно куплю") в разных наборах сформулирована разными словами. PMF считается
# для каждого набора отдельно и затем усредняется — это снижает чувствительность
# итогового результата к случайному выбору формулировки ОДНОГО конкретного
# набора (см. arXiv 2510.08338, методика усреднения по reference sets).

meta:
  version: 1
  scale_points: [1, 2, 3, 4, 5]
  language: ru
  min_sets_required: 4

scales:

  # --------------------------------------------------------------------------
  purchase_intent:
    name_ru: "Готовность купить"
    direction: "1 = точно не купил бы; 5 = точно купил бы"
    question: "Купили бы вы это? Расскажите, что думаете, и почему купили бы или нет."
    comment: >-
      4 набора используют разные разговорные регистры одной и той же шкалы решения
      о покупке: набор 1 — прямое решение («куплю / не куплю»), набор 2 — желание
      и тяга («хочется / не тянет»), набор 3 — рассмотрение и вероятность
      («рассмотрю / рассматривать не буду»), набор 4 — эмоциональный отклик
      («зацепило / не зацепило»). Усреднение PMF по всем 4 наборам снижает
      зависимость итога от случайной формулировки одного конкретного набора.
    anchor_sets:
      - label: "прямое решение"
        phrases:
          1: "Точно не куплю, даже даром не нужно."
          2: "Скорее всего, не куплю, как-то не моё."
          3: "Пока не знаю, надо ещё подумать."
          4: "Скорее куплю, выглядит вполне неплохо."
          5: "Куплю не раздумывая, беру точно."
      - label: "желание и тяга"
        phrases:
          1: "Вообще не хочется это брать."
          2: "Особого желания брать это нет."
          3: "Может быть, а может и нет."
          4: "Появилось реальное желание это взять."
          5: "Очень хочется взять это прямо сейчас."
      - label: "рассмотрение и вероятность"
        phrases:
          1: "Даже рассматривать это не буду."
          2: "Вряд ли стану всерьёз это рассматривать."
          3: "Возможно, стоит присмотреться повнимательнее, пока сложно сказать."
          4: "Вполне рассмотрю это в ближайшее время."
          5: "Обязательно возьму, даже без раздумий."
      - label: "эмоциональный отклик"
        phrases:
          1: "Совсем не зацепило, прохожу мимо."
          2: "Не особо зацепило, но пусть будет."
          3: "Так себе, ни зацепило, ни оттолкнуло."
          4: "Прилично зацепило, присмотрюсь повнимательнее к этому."
          5: "Очень зацепило, беру сразу без сомнений."

  # --------------------------------------------------------------------------
  appeal:
    name_ru: "Привлекательность"
    direction: "1 = совсем не нравится; 5 = очень нравится"
    question: "Насколько вам это нравится? Опишите свою первую реакцию своими словами."
    comment: >-
      4 набора: набор 1 — прямая оценка («нравится / не нравится»), набор 2 —
      через притяжение/отторжение («притягивает / отталкивает»), набор 3 —
      разговорно-эмоциональный регистр («кайф / фу»), набор 4 — через впечатление
      («впечатление сильное / впечатления никакого»). Разные лексические поля
      для одной и той же силы реакции — так усреднение не зависит от того,
      что конкретно из этого словами напомнил ответ респондента.
    anchor_sets:
      - label: "прямая оценка"
        phrases:
          1: "Совсем не нравится, никакого отклика."
          2: "Не особо нравится, слабый отклик."
          3: "Нормально, ни особого восторга, ни отторжения."
          4: "Вполне нравится, приятное впечатление осталось."
          5: "Очень нравится, прямо в точку попало."
      - label: "притяжение и отторжение"
        phrases:
          1: "Совершенно не притягивает, скорее отталкивает даже."
          2: "Слабо притягивает, ничего особенного не вижу."
          3: "Есть что-то, но без огонька."
          4: "Заметно притягивает, глаз сразу цепляется."
          5: "Очень притягивает, оторваться просто не могу."
      - label: "разговорно-эмоциональный"
        phrases:
          1: "Фу, вообще не моё, мимо."
          2: "Так себе, без особого восторга если честно."
          3: "Нормально, но без особых эмоций."
          4: "Даже приятно стало, есть свой кайф."
          5: "Настоящий восторг, вот это кайф."
      - label: "через впечатление"
        phrases:
          1: "Впечатления никакого, взгляд скользит мимо."
          2: "Впечатление слабое, быстро забудется наверное."
          3: "Впечатление ровное, ни плюс ни минус."
          4: "Впечатление хорошее, есть свой стиль."
          5: "Впечатление сильное, сразу западает в память."

  # --------------------------------------------------------------------------
  relevance:
    name_ru: "Релевантность лично мне"
    direction: "1 = совсем не про меня; 5 = точно про меня"
    question: "Насколько это лично про вас? Расскажите, откликается вам это или нет и почему."
    comment: >-
      4 набора: набор 1 — прямое «про меня / не про меня», набор 2 — через
      актуальность и значимость момента («актуально / не актуально сейчас»),
      набор 3 — через узнавание себя («узнаю себя / ничего общего»), набор 4 —
      бытовой регистр «мой случай / не мой случай». Разные способы сказать
      одно и то же «это релевантно/нерелевантно мне» — усреднение по ним и есть
      защита от того, что респондент случайно использует лексику только одного
      из наборов.
    anchor_sets:
      - label: "прямое совпадение"
        phrases:
          1: "Это вообще не про меня, мимо."
          2: "Скорее не про меня, если честно."
          3: "Отчасти про меня, отчасти нет."
          4: "Во многом это про меня."
          5: "Это прямо про меня, один в один."
      - label: "актуальность момента"
        phrases:
          1: "Совсем не актуально для меня сейчас."
          2: "Не особо актуально, есть дела поважнее."
          3: "Отчасти актуально, смотря в какой момент."
          4: "Довольно актуально для меня в целом."
          5: "Крайне актуально, прямо в тему сейчас."
      - label: "узнавание себя"
        phrases:
          1: "Ничего общего с моей жизнью, чужое."
          2: "Мало похоже на мою ситуацию обычно."
          3: "Что-то похоже, что-то нет у меня."
          4: "Многое узнаю в этом про себя."
          5: "Узнаю себя почти в каждой детали."
      - label: "мой случай / не мой случай"
        phrases:
          1: "Совсем не мой случай, другая история."
          2: "Скорее не мой случай, но кто знает."
          3: "Может быть и мой случай, а может нет."
          4: "Похоже на мой случай, довольно жизненно."
          5: "Это прямо мой случай, максимально жизненно."
